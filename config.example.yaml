# mini-agent example config
# 复制为 config.yaml 后填入你的真实信息。
#
# 配置来源：
#   - 本 YAML：提供 model / agent / environment 全部配置
#   - 命令行：仅 --task 用来传入要执行的任务

model:
  name: glm-5.1
  base_url: https://tokenhub.tencentmaas.com/v1
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

agent:
  step_limit: 30
  skip_confirm: false      # ⚠️ 数据无价：建议保持 false，每条命令都人工确认；改 true 风险自负

environment:
  cwd: ""                  # 空 = 当前目录
  timeout: 30              # 单条命令超时（秒）

#   mini.exe --config config.yaml --task "看看本地哪个文件最大"

